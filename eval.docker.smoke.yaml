providers:
  boyue_anthropic:
    base_url: https://api.anthropic.com
    api_format: anthropic
  boyue_openai:
    base_url: https://api.openai.com/v1
    api_format: openai-chat-completions

provider: boyue_anthropic
model: claude-sonnet-4-6

judge_model:
  provider: boyue_anthropic
  model: claude-sonnet-4-6

executor: docker
concurrency: 1
runs: 1
timeout: 600

harnesses:
  claude_code:
    version: "2.1.92"

  nanobot:
    version: "0.1.5"
